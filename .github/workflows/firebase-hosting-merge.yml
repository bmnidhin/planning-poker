name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
env:
  VITE_FB_API_KEY: '${{ secrets.REACT_APP_FB_API_KEY }}'
  VITE_FB_AUTH_DOMAIN: '${{ secrets.REACT_APP_FB_AUTH_DOMAIN }}'
  VITE_FB_PROJECT_ID: '${{ secrets.REACT_APP_FB_PROJECT_ID }}'
  VITE_FB_STORAGE_BUCKET: '${{ secrets.REACT_APP_FB_STORAGE_BUCKET }}'
  VITE_FB_MESSAGING_SENDER_ID: '${{ secrets.REACT_APP_FB_MESSAGING_SENDER_ID }}'
  VITE_FB_APP_ID: '${{ secrets.REACT_APP_FB_APP_ID }}'
  VITE_FB_MEASUREMENT_ID: '${{ secrets.REACT_APP_FB_MEASUREMENT_ID }}'      
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_POKER_NEPTUNE }}
          channelId: live
          projectId: poker-neptune
